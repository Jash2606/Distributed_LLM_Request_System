version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: llm_processor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_processor"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 1"
    env_file: .env
    environment:
      # Docker service-name overrides — .env uses localhost which only works locally.
      # These two lines override only the hostnames; every other setting comes from .env.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llm_processor
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    build: .
    command: python -m src.worker
    env_file: .env
    environment:
      # Same hostname overrides as api service.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llm_processor
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      replicas: 3

volumes:
  pgdata:
